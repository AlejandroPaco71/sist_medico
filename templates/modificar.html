{% extends 'base.html' %}

{% block content %}
<div class="card shadow">
    <div class="card-header bg-warning text-dark">
        <h2 class="h5 mb-0">Modificar Cita</h2>
    </div>
    <div class="card-body">
        <!-- Reutilizamos codigo de la creacion de nueva cita, agregando su value="" -->
        <form action="{{ url_for('modificar', id=cita.id) }}" method="post">
            
            <div class="mb-3">
                <label for="mascota" class="form-label">Nombre de la Mascota</label>
                <input type="text" class="form-control" id="mascota" name="mascota" 
                       value="{{ cita.mascota }}" required>
            </div>

            <div class="mb-3">
                <label for="propietario" class="form-label">Propietario</label>
                <input type="text" class="form-control" id="propietario" name="propietario" 
                       value="{{ cita.propietario }}" required>
            </div>

            <div class="mb-3">
                <label for="especie" class="form-label">Especie</label>
                <input type="text" class="form-control" id="especie" name="especie" value="{{ cita.especie }}" required>
                    
            </div>

            <div class="mb-3">
                <label for="fecha" class="form-label">Nueva Fecha </label>
                <input type="date" class="form-control" id="fecha" name="fecha" 
                       value="{{ cita.fecha }}" required>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Actualizar Datos</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
